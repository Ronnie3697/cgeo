name: Sync upstream cgeo

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync master branch from cgeo/cgeo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync ${{ github.repository }} --branch master --source cgeo/cgeo

      - name: Open sync PR into mapycz when upstream is ahead
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          ahead=$(gh api "repos/$REPO/compare/mapycz...master" --jq '.ahead_by')
          existing=$(gh api "repos/$REPO/pulls?state=open&base=mapycz&head=${REPO%/*}:master" --jq 'length')
          if [ "$ahead" = "0" ]; then
            echo "mapycz already includes all upstream commits, no PR needed"
            exit 0
          fi
          if [ "$existing" != "0" ]; then
            echo "Sync PR already open, leaving alone"
            exit 0
          fi
          gh api "repos/$REPO/pulls" -X POST \
            -f base=mapycz \
            -f head=master \
            -f title="Sync upstream cgeo ($ahead new commit(s))" \
            -f body="Automated upstream sync from cgeo/cgeo. Review the diff, then merge to bring upstream changes into mapycz. Resolve any conflicts with your Mapy.com customizations."
