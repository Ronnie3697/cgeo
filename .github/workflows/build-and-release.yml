name: Build and release APK

on:
  push:
    branches: [mapycz]
    paths-ignore:
      - 'README.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-and-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build basic debug APK
        run: ./gradlew :main:assembleBasicDebug --no-daemon --stacktrace

      - name: Stage APK for release
        run: |
          mkdir -p release
          cp main/build/outputs/apk/basic/debug/cgeo-debug.apk release/cgeo-mapycz-debug.apk
          cd release
          sha256sum cgeo-mapycz-debug.apk

      - name: Write release notes
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          short_sha=${SHA:0:7}
          {
            echo "Automatically built from \`mapycz\` branch at commit \`$short_sha\`."
            echo ""
            echo "Direct install URL (bookmark on phone):"
            echo "https://github.com/$REPO/releases/latest/download/cgeo-mapycz-debug.apk"
            echo ""
            echo "Install replaces any previous **c:geo (developer)** build; app data and Mapy.com API key are preserved."
          } > release-notes.md
          echo "SHORT_SHA=$short_sha" >> "$GITHUB_ENV"

      - name: Refresh latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          gh release delete latest --repo "$REPO" --cleanup-tag --yes 2>/dev/null || true
          gh release create latest \
            --repo "$REPO" \
            --target "$SHA" \
            --title "Latest auto-build ($SHORT_SHA)" \
            --notes-file release-notes.md \
            release/cgeo-mapycz-debug.apk
